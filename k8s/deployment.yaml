apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-platform
  template:
    metadata:
      labels:
        app: hello-platform
    spec:
      containers:
        - name: hello-platform
          image: hello-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "dev"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
