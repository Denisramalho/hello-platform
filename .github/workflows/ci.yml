name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6.4
        with:
          go-version: '1.24'
      - run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Login no Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Login no ACR
        run: az acr login --name 15daysofcloudacr

      - name: Build e push
        run: |
          IMAGE=15daysofcloudacr.azurecr.io/hello-platform
          TAG=${GITHUB_SHA::7}
          docker build -t $IMAGE:$TAG .
          docker push $IMAGE:$TAG
